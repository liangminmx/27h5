name: Build and Push Docker Image

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/h5game

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure game directory exists
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          if [ -d "game" ]; then
            echo "game directory exists"
          else
            echo "game directory not found, attempting to download from latest release"
            curl -sL https://github.com/${{ github.repository }}/releases/download/latest/game.zip -o game.zip || {
              echo "Failed to download game.zip. Please create a release with game.zip attached."
              exit 1
            }
            unzip -q game.zip -d .
            mv game/www/wwwroot/game/* game/ 2>/dev/null || true
            rm -rf game/www
            rm -f game.zip
          fi

      - name: Download game files from latest release
        if: github.event_name == 'release'
        run: |
          curl -sL https://github.com/${{ github.repository }}/releases/download/latest/game.zip -o game.zip
          unzip -q game.zip -d .
          mv game/www/wwwroot/game/* game/ 2>/dev/null || true
          rm -rf game/www

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
